publish:
  - "github"
productName: "Exiled Exchange 2"
npmRebuild: false
files:
  - "package.json"
  - "node_modules/linux-evdev-wayland-helper/**/*"
  - from: "dist"
    to: "."
    filter: ["main.js", "vision.js"]
  - from: "../renderer/dist"
    to: "."
asarUnpack:
  - "node_modules/linux-evdev-wayland-helper/native/linux-evdev-helper/linux-evdev-helper"
extraMetadata:
  main: "main.js"
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
win:
  target:
    - "nsis"
    - "portable"
linux:
  target:
    - "AppImage"
mac:
  target:
    - target: "dmg"
      arch:
        - "universal"
  identity: null
  x64ArchFiles: "*"
appImage:
  executableArgs:
    - "--sandbox"
