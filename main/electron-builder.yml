publish:
  - "github"
productName: "Exiled Exchange 2"
npmRebuild: false
asarUnpack:
  - "linux-evdev-helper"
files:
  - "package.json"
  - from: "dist"
    to: "."
    filter: ["main.js", "vision.js", "linux-evdev-helper"]
  - from: "../renderer/dist"
    to: "."
extraMetadata:
  main: "main.js"
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
win:
  target:
    - "nsis"
    - "portable"
linux:
  target:
    - "AppImage"
mac:
  target:
    - target: "dmg"
      arch:
        - "universal"
  identity: null
  x64ArchFiles: "*"
appImage:
  executableArgs:
    - "--sandbox"
